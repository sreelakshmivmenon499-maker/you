<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Animation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(#ffb6d9,#ffd9ec,#ffffff);
height:100vh;
}

.cloud{
position:absolute;
background:white;
width:150px;
height:60px;
border-radius:50px;
opacity:.8;
animation:cloud 30s linear infinite;
}

.cloud:before{
content:"";
position:absolute;
width:70px;
height:70px;
background:white;
border-radius:50%;
top:-30px;
left:20px;
}

.cloud:after{
content:"";
position:absolute;
width:80px;
height:80px;
background:white;
border-radius:50%;
top:-40px;
right:20px;
}

.c1{top:50px;left:-200px;}
.c2{top:150px;left:-400px;animation-delay:8s;}
.c3{top:250px;left:-600px;animation-delay:15s;}

@keyframes cloud{
100%{transform:translateX(1800px);}
}

.scene{
position:relative;
width:100%;
height:100%;
}

.girl,.boy{
position:absolute;
bottom:80px;
text-align:center;
font-size:90px;
}

.girl{
left:-150px;
animation:walk 5s forwards;
}

@keyframes walk{
0%{left:-150px;}
100%{left:28%;}
}

.boy{
right:18%;
}

.message{
position:absolute;
top:50px;
width:100%;
text-align:center;
font-size:34px;
color:#ff1493;
font-weight:bold;
opacity:0;
animation:showText 1s forwards;
animation-delay:5s;
}

@keyframes showText{
to{opacity:1;}
}

.buttons{
position:absolute;
bottom:100px;
right:12%;
display:none;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
color:white;
transition:.3s;
}

.yes{
background:#ff149
